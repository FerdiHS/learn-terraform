repos:
  - repo: local
    hooks:
      - id: terraform-fmt
        name: terraform fmt
        entry: terraform fmt -check -recursive
        language: system
        files: \.tf$
        pass_filenames: false
      - id: terraform-validate
        name: terraform validate
        entry: terraform validate
        language: system
        files: \.tf$
        pass_filenames: false
